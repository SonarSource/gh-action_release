---
name: Release
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Release branch (master or branch-*)
        required: true
        type: string
        default: master
      version:
        description: Release version
        required: true
        type: string

jobs:
  release:
    name: Release ${{ inputs.version }}
    runs-on: github-ubuntu-latest-s
    permissions:
      contents: read
      id-token: write
    steps:
      - name: get secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@881045d830534a70ec3c7c275fa3714412c8ff6e # 3.6.1
        with:
          secrets: |
            development/github/token/{REPO_OWNER_NAME_DASH}-release token | github_token;
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-tags: true
          token: ${{ fromJSON(steps.secrets.outputs.vault).github_token }}
          persist-credentials: true
      - name: Git config
        run: |
          git config user.name sonartech
          git config user.email sonartech@sonarsource.com
      - name: release
        env:
          GH_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).github_token }}
          BRANCH: ${{ inputs.branch }}
          VERSION: ${{ inputs.version }}
        run: scripts/release.sh "$BRANCH" "$VERSION"