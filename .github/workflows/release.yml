---
name: Release
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Release branch (master or branch-*)
        required: true
        type: string
        default: master
      version:
        description: Release version
        required: true
        type: string

jobs:
  release:
    name: Release ${{ inputs.version }}
    runs-on: github-ubuntu-latest-s
    permissions:
      contents: read
      id-token: write
    steps:
      - name: get secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@0a3114fe1230b784c35b53b099f9ab1f1e538cc7 # 3.5.0
        with:
          secrets: |
            development/github/token/{REPO_OWNER_NAME_DASH}-release token | github_token;
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: true
          token: ${{ fromJSON(steps.secrets.outputs.vault).github_token }}
          persist-credentials: true
      - name: Git config
        run: |
          git config user.name sonartech
          git config user.email sonartech@sonarsource.com
      - name: release
        env:
          GH_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).github_token }}
          BRANCH: ${{ inputs.branch }}
          VERSION: ${{ inputs.version }}
        run: scripts/release.sh "$BRANCH" "$VERSION"