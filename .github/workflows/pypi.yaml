name: PyPI
"on":
  workflow_call:
    inputs:
      version:
        type: string
        description: Version (alternative to release event)
        required: false
      vaultAddr:
        type: string
        description: Custom Vault installation
        default: https://vault.sonar.build:8200
        required: false
      vaultTokenKey:
        type: string
        description: Vault key to read the token from
        default: pypi
        required: false
      artifactoryRoleSuffix:
        type: string
        description: Artifactory reader suffix specified in vault repo config
        default: private-reader
        required: false
      downloadExclusions:
        type: string
        description: exclusions for the JFrog build download
        default: "-"
        required: false
      pypiRepoUrl:
        type: string
        description: PyPI Repository URL for publishing the package
        default: https://upload.pypi.org/legacy/
        required: false
      slackChannel:
        type: string
        description: Slack channel to post notifications
        default: build
        required: false
      githubEnvironment:
        type: string
        description: GitHub Environment to set on the OIDC-using job
        required: false

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: warp-custom-ubuntu-24-04
    environment: ${{ inputs.githubEnvironment }}
    permissions:
      id-token: write  # to authenticate via OIDC
      contents: read  # to revert a GitHub release
    timeout-minutes: 30
    if: ${{ (github.event_name == 'release' && github.event.action == 'published') || inputs.version != '' }}
    steps:
      - name: Get the version
        id: get_version
        run: |
          IFS=. read -r major minor patch build <<< "${{ inputs.version || github.event.release.tag_name }}"
          echo "build=${build}" >> $GITHUB_OUTPUT
          echo "patch=${patch}" >> $GITHUB_OUTPUT
          echo "minor=${minor}" >> $GITHUB_OUTPUT
          echo "major=${major}" >> $GITHUB_OUTPUT
      - name: Create local repository directory
        id: local_repo
        run: echo "dir=$(mktemp -d repo.XXXXXXXX)" >> $GITHUB_OUTPUT
      - name: Vault
        id: secrets
        uses: SonarSource/vault-action-wrapper@0a3114fe1230b784c35b53b099f9ab1f1e538cc7 # 3.5.0
        with:
          url: ${{ inputs.vaultAddr }}
          secrets:
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-${{ inputs.artifactoryRoleSuffix }} access_token  | artifactory_access_token;
            development/kv/data/${{ inputs.vaultTokenKey }} token | pypi_token;
            development/kv/data/slack webhook | slack_webhook;
      - name: Setup JFrog
        uses: SonarSource/jfrog-setup-wrapper@b243f5b25440cdcb062db329eec5fd9c9cd2dab2 # 3.7.0
        with:
          jfrogAccessToken: ${{ fromJSON(steps.secrets.outputs.vault).artifactory_access_token }}
      - name: Download Artifacts
        uses: SonarSource/gh-action_release/download-build@05db046385edc88eb40554c2677c1d726f4987f6 # master
        with:
          build-number: ${{ steps.get_version.outputs.build }}
          local-repo-dir: ${{ steps.local_repo.outputs.dir }}
          exclusions: ${{ inputs.downloadExclusions }}
          remote-repo: sonarsource-pypi-public-releases
          flat-download: true
          download-checksums: false
      - name: Publish to PyPI
        id: publish-pypi
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: ${{ steps.local_repo.outputs.dir }}
          password: ${{ fromJSON(steps.secrets.outputs.vault).pypi_token }}
          repository-url: ${{ inputs.pypiRepoUrl }}
          print-hash: true
      - name: Notify on failure
        if: ${{ failure() }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ fromJSON(steps.secrets.outputs.vault).slack_webhook }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "${{ inputs.slackChannel }}",
              "attachments": [
                {
                  "color": "#ff0000",
                  "text": "PyPI publish failed in `${{ github.repository }}` (event: `${{ github.event_name }}`, triggered by `${{ github.actor }}`).\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                }
              ]
            }
      - name: Exit with error
        if: ${{ failure() }}
        run: exit 1
