name: NpmJS
"on":
  workflow_call:
    inputs:
      version:
        type: string
        description: Version (alternative to release event)
        required: false
      vaultAddr:
        type: string
        description: Custom Vault installation
        default: https://vault.sonar.build:8200
        required: false
      vaultTokenKey:
        type: string
        description: Vault key to read the token from
        default: npmjs
        required: false
      artifactoryRoleSuffix:
        type: string
        description: Artifactory reader suffix specified in vault repo config
        default: private-reader
        required: false
      downloadExclusions:
        type: string
        description: Exclusions for the JFrog build download
        default: "-"
        required: false
      npmRegistryUrl:
        type: string
        description: npm Registry URL for publishing the package
        default: https://registry.npmjs.org/
        required: false
      slackChannel:
        type: string
        description: Slack channel to post notifications
        default: build
        required: false
      useNpmTrustedPublisher:
        type: boolean
        description: Use npm Trusted Publishers (OIDC) instead of Vault token for npm publish
        default: false
        required: false
      githubEnvironment:
        type: string
        description: GitHub Environment to set on the OIDC-using job
        required: false

jobs:
  publish-to-npm:
    name: Publish to npmjs
    runs-on: github-ubuntu-latest-s
    environment: ${{ inputs.githubEnvironment }}
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 30
    if: ${{ (github.event_name == 'release' && github.event.action == 'published') || inputs.version != '' }}
    steps:
      - name: Get the version
        id: get_version
        run: |
          IFS='.-' read -r major minor patch build <<< "${{ inputs.version || github.event.release.tag_name }}"
          version="${major}.${minor}.${patch}"
          echo "build=${build}" >> $GITHUB_OUTPUT
          echo "patch=${patch}" >> $GITHUB_OUTPUT
          echo "minor=${minor}" >> $GITHUB_OUTPUT
          echo "major=${major}" >> $GITHUB_OUTPUT
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Create Local Repository Directory
        id: local_repo
        run: echo "dir=$(mktemp -d repo.XXXXXXXX)" >> $GITHUB_OUTPUT

      - name: Retrieve Secrets from Vault
        id: secrets
        uses: SonarSource/vault-action-wrapper@881045d830534a70ec3c7c275fa3714412c8ff6e # 3.6.1
        with:
          url: ${{ inputs.vaultAddr }}
          secrets: |
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-${{ inputs.artifactoryRoleSuffix }} access_token | artifactory_access_token;
            ${{ !inputs.useNpmTrustedPublisher && format('development/kv/data/{0} sonartech_npm_token | npm_token;', inputs.vaultTokenKey) || '' }}
            development/kv/data/slack webhook | slack_webhook;

      - name: Setup JFrog
        uses: SonarSource/jfrog-setup-wrapper@b243f5b25440cdcb062db329eec5fd9c9cd2dab2 # 3.7.0
        with:
          jfrogAccessToken: ${{ fromJSON(steps.secrets.outputs.vault).artifactory_access_token }}

      - name: Download Artifacts from JFrog
        uses: SonarSource/gh-action_release/download-build@c9d923c35b5e487fe018ca9f1e07aa008c8dd53b # master
        with:
          build-number: ${{ steps.get_version.outputs.build }}
          local-repo-dir: ${{ steps.local_repo.outputs.dir }}
          exclusions: ${{ inputs.downloadExclusions }}
          remote-repo: sonarsource-npm-public-releases
          flat-download: true
          download-checksums: false

      - name: Extract .tgz package
        working-directory: ${{ steps.local_repo.outputs.dir }}
        run: |
          # Find the first .tgz file in the directory
          file=$(find . -type f -name "*.tgz" | head -n 1)
          if [ -z "$file" ]; then
            echo "No .tgz package found in the repository."
            exit 1
          fi
          echo "Found package: $file"
          # Create a directory for the package
          mkdir -p package
          # Extract the .tgz file into the package directory, stripping the first component
          tar -xzf "$file" -C package --strip-components=1
          echo "Package extracted to ./package"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Update package version
        working-directory: ${{ steps.local_repo.outputs.dir }}/package
        run: npm version --no-git-tag-version ${{ steps.get_version.outputs.version }}

      - name: Checkout developer repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ github.event.repository.full_name}}
          path: developer_repo
          token: ${{ github.token }}

      - name: Configure npm registry
        if: ${{ !inputs.useNpmTrustedPublisher }}
        run: |
          if [ -f developer_repo/.github/workflows/.npmrc ]; then
            echo ".npmrc file found in developer repository at .github/workflows/.npmrc."
            cp developer_repo/.github/workflows/.npmrc ~/.npmrc
          else
            echo ".npmrc file not found in developer repository. Using default configuration."
            echo "always-auth=true" > ~/.npmrc
            echo "email=helpdesk+npmjs@sonarsource.com" >> ~/.npmrc
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
          fi
        env:
          NPM_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).npm_token }}

      - name: Publish npm package to npmjs
        if: ${{ !inputs.useNpmTrustedPublisher }}
        working-directory: ${{ steps.local_repo.outputs.dir }}/package
        env:
          NPM_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).npm_token }}
        run: |
          npm publish

      - name: Publish npm package to npmjs (Trusted Publisher)
        if: ${{ inputs.useNpmTrustedPublisher }}
        working-directory: ${{ steps.local_repo.outputs.dir }}/package
        run: |
          npm publish --provenance --access public

      - name: Notify on Failure
        if: ${{ failure() }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ fromJSON(steps.secrets.outputs.vault).slack_webhook }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "${{ inputs.slackChannel }}",
              "attachments": [
                {
                  "color": "#ff0000",
                  "text": "npm publish failed in `${{ github.repository }}` (event: `${{ github.event_name }}`, triggered by `${{ github.actor }}`).\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                }
              ]
            }

      - name: Exit with Error
        if: ${{ failure() }}
        run: exit 1
