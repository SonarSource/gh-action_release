# yamllint disable rule:line-length
---
name: Maven Central
"on":
  workflow_call:
    inputs:
      version:
        type: string
        description: Version (alternative to release event)
        required: false
      vaultAddr:
        type: string
        description: Custom Vault installation
        default: https://vault.sonar.build:8200
        required: false
      artifactoryRoleSuffix:
        type: string
        description: Artifactory reader suffix specified in vault repo config
        default: private-reader
        required: false
      downloadExclusions:
        type: string
        description: exclusions for the JFrog build download
        default: "-"
        required: false
      projectName:
        type: string
        description: Project name for build info (may be different from repository name for multi-artifact repos)
        required: false
      githubEnvironment:
        type: string
        description: GitHub Environment to set on the OIDC-using job
        required: false

jobs:
  maven-central:
    name: Push to maven Central
    runs-on: github-ubuntu-latest-s
    environment: ${{ inputs.githubEnvironment }}
    permissions:
      id-token: write  # to authenticate via OIDC
      contents: read  # to revert a github release
    timeout-minutes: 60
    if: ${{ (github.event_name == 'release' && github.event.action == 'published') || inputs.version != '' }}
    outputs:
      maven-central: ${{ steps.maven-central-sync.outcome }}
    steps:
      - name: Get the version
        id: get_version
        run: |
          IFS=. read -r major minor patch build <<< "${{ inputs.version || github.event.release.tag_name }}"
          echo "build=${build}" >> $GITHUB_OUTPUT
          echo "patch=${patch}" >> $GITHUB_OUTPUT
          echo "minor=${minor}" >> $GITHUB_OUTPUT
          echo "major=${major}" >> $GITHUB_OUTPUT
      - name: Create local repository directory
        id: local_repo
        run: echo "dir=$(mktemp -d repo.XXXXXXXX)" >> $GITHUB_OUTPUT
      - name: Vault
        id: secrets
        uses: SonarSource/vault-action-wrapper@881045d830534a70ec3c7c275fa3714412c8ff6e # 3.6.1
        with:
          url: ${{ inputs.vaultAddr }}
          secrets:
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-${{ inputs.artifactoryRoleSuffix }} access_token  | artifactory_access_token;
            development/kv/data/ossrh token | central_token;
            development/kv/data/slack webhook | slack_webhook;
      - name: Setup JFrog
        uses: SonarSource/jfrog-setup-wrapper@b243f5b25440cdcb062db329eec5fd9c9cd2dab2 # 3.7.0
        with:
          jfrogAccessToken: ${{ fromJSON(steps.secrets.outputs.vault).artifactory_access_token }}
      - name: Download Artifacts
        uses: SonarSource/gh-action_release/download-build@c9d923c35b5e487fe018ca9f1e07aa008c8dd53b # master
        with:
          build-number: ${{ steps.get_version.outputs.build }}
          local-repo-dir: ${{ steps.local_repo.outputs.dir }}
          exclusions: ${{ inputs.downloadExclusions }}
          project-name: ${{ inputs.projectName }}
      - name: Maven Central Sync
        id: maven-central-sync
        continue-on-error: true
        uses: SonarSource/gh-action_release/maven-central-sync@c9d923c35b5e487fe018ca9f1e07aa008c8dd53b # master
        with:
          local-repo-dir: ${{ steps.local_repo.outputs.dir }}
          central-url: https://central.sonatype.com
          auto-publish: "true"
        env:
          CENTRAL_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).central_token }}
          DEPLOYMENT_NAME: ${{ inputs.projectName != '' && inputs.projectName || github.event.repository.name }}-${{ steps.get_version.outputs.build }}
      - name: Notify on failure
        if: ${{ failure() || steps.maven-central-sync.outcome == 'failure' }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ fromJSON(steps.secrets.outputs.vault).slack_webhook }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "#ff0000",
                  "text": "Maven Central sync failed in `${{ github.repository }}` (event: `${{ github.event_name }}`, triggered by `${{ github.actor }}`).\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                }
              ]
            }
      - name: Exit with error
        if: ${{ failure() || steps.maven-central-sync.outcome == 'failure' }}
        run: exit 1
